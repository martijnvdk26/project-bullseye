services:
  database:
    image: postgres:15
    container_name: bullseye-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bullseye_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bullseyedb
    expose:
      - "5432"
    volumes:
      - bullseye_db_data:/var/lib/postgresql/data
    networks:
      - bullseye-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: bullseye-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: martijnvanderkooi@gmail.com
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "81:80"
    networks:
      - bullseye-network
    depends_on:
      - database

  # Python Dartbot/Computer Vision microservice. Deliberately has no "ports"
  # mapping (only "expose") so it's reachable from the backend over the
  # internal Docker network but never directly from the host - see R03 in
  # the report's risk analysis.
  ai-service:
    build:
      context: ./ai-service
    container_name: bullseye-ai-service
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      - bullseye-network

  backend:
    build:
      context: ./backend/BullseyeAPI
    container_name: bullseye-backend
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: "Host=database;Database=bullseyedb;Username=bullseye_admin;Password=${POSTGRES_PASSWORD}"
      AiService__BaseUrl: "http://ai-service:8000"
      Jwt__Key: "${JWT_KEY}"
      Resend__ApiKey: "${RESEND_API_KEY}"
      Frontend__BaseUrl: "${FRONTEND_BASE_URL:-https://darts.martijnvanderkooi.nl}"
    expose:
      - "8080"
    depends_on:
      - database
      - ai-service
    networks:
      - bullseye-network

  frontend:
    build:
      context: ./frontend
    container_name: bullseye-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - bullseye-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: bullseye-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
    depends_on:
      - frontend
    networks:
      - bullseye-network

volumes:
  bullseye_db_data:
    name: bullseye_db_data

networks:
  bullseye-network:
    name: bullseye-network
    driver: bridge