<aside class="stats-panel" [class.active-panel]="player.isActive">
  <h3>Match Stats</h3>
  <div class="stat-row">
    <span>Average:</span>
    <strong>{{ player.average | number:'1.2-2' }}</strong>
  </div>
  <div class="stat-row">
    <span>Darts:</span>
    <strong>{{ player.dartsThrown }}</strong>
  </div>
</aside>
